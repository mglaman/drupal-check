name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - "8.4"
          - "8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: none
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
      - name: Validate composer.json and composer.lock
        run: composer validate --strict
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: PHPCS
        run: php vendor/bin/phpcs src

  tests:
    runs-on: ubuntu-latest
    name: Tests | PHP ${{ matrix.php-version }} | Drupal 11.3.0
    strategy:
      matrix:
        php-version:
          - "8.4"
          - "8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: none
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
      - name: Setup Drupal 11.3.0
        run: COMPOSER_MEMORY_LIMIT=-1 composer create-project drupal/recommended-project:11.3.0 ~/drupal --no-interaction --prefer-dist
      - name: Require local drupal-check
        run: |
          cd ~/drupal
          composer config repositories.0 '{"type":"path","url":"'"$GITHUB_WORKSPACE"'","options":{"symlink":false}}'
          COMPOSER_MEMORY_LIMIT=-1 composer require mglaman/drupal-check "*@dev"
      - name: Analyze core/install.php
        run: |
          cd ~/drupal
          ./vendor/bin/drupal-check -vvv web/core/install.php
      - name: Analyze dynamic_page_cache
        run: |
          cd ~/drupal
          ./vendor/bin/drupal-check -vvv web/core/modules/dynamic_page_cache || if (($? == 255)); then false; else true; fi
